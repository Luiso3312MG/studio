<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>K&B Dev</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
theme: {
extend: {
colors: {
'kb-navy': '#0A1128',
'kb-gold': '#D4AF37',
'kb-gold-light': '#F1D592',
'kb-dark-blue': '#001F3F',
},
fontFamily: {
'serif-display': ['Cinzel','serif'],
'sans-ui': ['Montserrat','sans-serif'],
}
}
}
}
</script>

<style>
.bg-texture{
background-image: radial-gradient(circle at 50% 50%, #1a2a44 0%, #0a1128 100%);
position: relative;
overflow: hidden;
}

.bg-texture::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
opacity:0.03;
pointer-events:none;
background-image:url(https://lh3.googleusercontent.com/aida-public/AB6AXuBntmhkLs_X3n1-67ChPcwHPyn9eVJmGb35-FNacGgYv93KPiNvXtPI6VJSW3dtofA0Kt71v7e0gMhB3DIrthObaLuFEmbvVCUoHZDonAbQrCQTbbt9Pt0_g91AErN1by8FOUDoa7vng0Wp2UN2_dzzEqUD3Cl3otR_kqlU27uFq1zUL9SS3fTcweSjvlKN6GIqOB54Ttz9-8xVw-uPoIkb8TEW9UQlRFf0DouBbZrIylDlEWZWAdt9kvMx1yt_4f5epSf8xtJ9NzjL);
}

.luxury-input:focus{
border-color:#D4AF37;
box-shadow:0 0 0 1px #D4AF37;
}
</style>

</head>

<body class="font-sans-ui text-kb-navy antialiased">

<main class="min-h-screen w-full flex items-center justify-center bg-texture px-4">

<section class="w-full max-w-md bg-white/95 backdrop-blur-sm p-10 rounded-sm shadow-2xl flex flex-col items-center">

<header class="flex flex-col items-center mb-10">

<div class="mb-2">
<svg fill="none" height="60" viewBox="0 0 24 24" width="60">
<path d="M5 16L3 5L8.5 10L12 4L15.5 10L21 5L19 16H5Z"
fill="#D4AF37" stroke="#D4AF37"/>
<path d="M5 18H19V20H5V18Z" fill="#D4AF37"/>
</svg>
</div>

<h1 class="font-serif-display text-4xl tracking-widest text-kb-navy font-bold">K&B</h1>
<p class="uppercase text-[10px] tracking-[0.3em] text-kb-gold mt-1 font-medium">Developers</p>

</header>

<form id="loginForm" class="w-full space-y-6">

<div class="space-y-1">
<label class="block text-[11px] uppercase tracking-wider text-gray-500 font-semibold ml-1">
Correo Electrónico
</label>

<input
class="luxury-input w-full px-4 py-3 bg-gray-50 border border-gray-200 text-sm"
id="username"
type="text"
placeholder="usuario"
required>
</div>

<div class="space-y-1 relative">

<label class="block text-[11px] uppercase tracking-wider text-gray-500 font-semibold ml-1">
Contraseña
</label>

<input
class="luxury-input w-full px-4 py-3 bg-gray-50 border border-gray-200 text-sm"
id="password"
type="password"
placeholder="••••••••"
required>

<button
type="button"
id="togglePassword"
class="absolute right-3 top-9 text-xs text-gray-500">
ver
</button>

</div>

<div id="errorBox" class="hidden text-red-500 text-sm text-center"></div>

<div class="pt-4">
<button
class="w-full py-4 bg-kb-gold hover:bg-kb-gold-light text-kb-navy font-bold uppercase tracking-[0.2em] text-xs shadow-md"
type="submit">
Ingresar
</button>
</div>

</form>

<footer class="mt-12 text-center">
<p class="text-[10px] text-gray-400 uppercase tracking-widest">
© <span id="current-year"></span> K&B Studio
</p>
</footer>

</section>
</main>

<script>

document.getElementById('current-year').textContent=new Date().getFullYear()

const toggle=document.getElementById("togglePassword")
const passwordInput=document.getElementById("password")

toggle.addEventListener("click",()=>{
const type=passwordInput.getAttribute("type")==="password"?"text":"password"
passwordInput.setAttribute("type",type)
toggle.textContent= type==="password" ? "ver":"ocultar"
})

const form=document.getElementById("loginForm")
const errorBox=document.getElementById("errorBox")

form.addEventListener("submit",async(e)=>{
e.preventDefault()

errorBox.classList.add("hidden")

const username=document.getElementById("username").value
const password=document.getElementById("password").value

try{

const response=await fetch("/api/auth/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
credentials:"include",
body:JSON.stringify({
username:username,
password:password
})
})

if(!response.ok){
throw new Error("Credenciales incorrectas")
}

const data=await response.json()

if(data.authenticated){
window.location.href="/index.html"
return
}

throw new Error("No fue posible iniciar sesión")

}catch(error){

errorBox.textContent=error.message
errorBox.classList.remove("hidden")

}

})

</script>

</body>
</html>
