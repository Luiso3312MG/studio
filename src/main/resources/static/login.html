<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>K&B Studio - Login</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;500&display=swap"
          rel="stylesheet"/>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

    <script>
        tailwind.config = {
        theme:{
        extend:{
        colors:{
        'kb-navy':'#0A1128',
        'kb-gold':'#D4AF37',
        'kb-gold-light':'#F1D592'
        },
        fontFamily:{
        'serif-display':['Cinzel','serif'],
        'sans-ui':['Montserrat','sans-serif']
        }
        }
        }
        }
    </script>

    <style>
        .bg-texture{
        background-image: radial-gradient(circle at 50% 50%, #1a2a44 0%, #0a1128 100%);
        }

        .luxury-input:focus{
        border-color:#D4AF37;
        box-shadow:0 0 0 1px #D4AF37;
        }
    </style>

</head>

<body class="font-sans-ui antialiased bg-texture flex items-center justify-center min-h-screen">

<div class="bg-white/95 backdrop-blur-sm w-full max-w-md p-10 shadow-2xl">

    <header class="text-center mb-10">

        <h1 class="font-serif-display text-4xl font-bold tracking-widest text-kb-navy">K&B</h1>
        <p class="text-xs tracking-[0.3em] uppercase text-kb-gold mt-2">Developers</p>

    </header>

    <form id="loginForm" class="space-y-6">

        <div>
            <label class="text-xs uppercase tracking-widest text-gray-500 font-semibold">Correo</label>

            <input
                    id="username"
                    type="email"
                    required
                    placeholder="correo@ejemplo.com"
                    class="luxury-input w-full px-4 py-3 mt-1 bg-gray-50 border border-gray-200 text-sm focus:outline-none"
            />

        </div>


        <div>

            <label class="text-xs uppercase tracking-widest text-gray-500 font-semibold">Contraseña</label>

            <div class="relative mt-1">

                <input
                        id="password"
                        type="password"
                        required
                        placeholder="••••••••"
                        class="luxury-input w-full px-4 py-3 pr-12 bg-gray-50 border border-gray-200 text-sm focus:outline-none"
                />

                <button
                        id="togglePassword"
                        type="button"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-kb-gold transition-colors cursor-pointer"
                >
                    <i class="fas fa-eye"></i>
                </button>

            </div>

        </div>

        <div id="errorBox" class="hidden text-red-600 text-sm bg-red-50 border border-red-200 px-3 py-2"></div>

        <button
                id="submitButton"
                class="w-full py-3 bg-kb-gold hover:bg-kb-gold-light text-kb-navy font-bold uppercase tracking-[0.2em] text-xs transition-all"
                type="submit"
        >
            Ingresar
        </button>

    </form>

    <footer class="mt-10 text-center text-xs text-gray-400 uppercase tracking-widest">
        © <span id="current-year"></span> K&B Studio
    </footer>

</div>

<script>

    document.getElementById("current-year").textContent=new Date().getFullYear()

    const toggle=document.getElementById("togglePassword")
    const passwordInput=document.getElementById("password")
    const icon=toggle.querySelector("i")

    toggle.addEventListener("click",()=>{

    const isPassword=passwordInput.type==="password"

    if(isPassword){

    passwordInput.type="text"
    icon.classList.remove("fa-eye")
    icon.classList.add("fa-eye-slash")

    }else{

    passwordInput.type="password"
    icon.classList.remove("fa-eye-slash")
    icon.classList.add("fa-eye")

    }

    })

    const form=document.getElementById("loginForm")
    const errorBox=document.getElementById("errorBox")
    const submitButton=document.getElementById("submitButton")

    form.addEventListener("submit",async(e)=>{

    e.preventDefault()

    errorBox.classList.add("hidden")

    const username=document.getElementById("username").value
    const password=document.getElementById("password").value

    submitButton.disabled=true
    submitButton.textContent="Ingresando..."

    try{

    const response=await fetch("/api/auth/login",{
    method:"POST",
    headers:{
    "Content-Type":"application/json"
    },
    credentials:"include",
    body:JSON.stringify({
    email:email,
    password:password
    })
    })

    if(!response.ok){

    let message="No fue posible iniciar sesión"

    if(response.status===401){
    message="Correo o contraseña incorrectos"
    }

    if(response.status===403){
    message="Usuario inactivo"
    }

    throw new Error(message)

    }

    const data=await response.json()

    if(data.authenticated){

    window.location.href="/index.html"
    return

    }

    throw new Error("No fue posible iniciar sesión")

    }catch(error){

    errorBox.textContent=error.message
    errorBox.classList.remove("hidden")

    }finally{

    submitButton.disabled=false
    submitButton.textContent="Ingresar"

    }

    })

</script>

</body>
</html>
